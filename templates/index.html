<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khalid Encryption Pro - نظام التشفير الاحترافي</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-theme">
    <div class="container-login">
        <div class="login-box">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-lock"></i>
                </div>
                <h1>Khalid Encryption Pro</h1>
                <p>نظام التشفير الاحترافي والآمن</p>
            </div>

            <div id="loginForm" class="form-container">
                <div class="form-group">
                    <label for="loginUsername">
                        <i class="fas fa-user"></i> اسم المستخدم
                    </label>
                    <input type="text" id="loginUsername" placeholder="أدخل اسم المستخدم" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword">
                        <i class="fas fa-key"></i> كلمة المرور
                    </label>
                    <input type="password" id="loginPassword" placeholder="أدخل كلمة المرور" required>
                </div>

                <button type="button" class="btn-primary" onclick="handleLogin()">
                    <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                </button>

                <div class="divider">أو</div>

                <button type="button" class="btn-secondary" onclick="toggleRegister()">
                    <i class="fas fa-user-plus"></i> إنشاء حساب جديد
                </button>
            </div>

            <div id="registerForm" class="form-container" style="display: none;">
                <div class="form-group">
                    <label for="regUsername">
                        <i class="fas fa-user"></i> اسم المستخدم
                    </label>
                    <input type="text" id="regUsername" placeholder="اختر اسم مستخدم" required>
                </div>

                <div class="form-group">
                    <label for="regEmail">
                        <i class="fas fa-envelope"></i> البريد الإلكتروني
                    </label>
                    <input type="email" id="regEmail" placeholder="أدخل بريدك الإلكتروني" required>
                </div>

                <div class="form-group">
                    <label for="regPassword">
                        <i class="fas fa-key"></i> كلمة المرور
                    </label>
                    <input type="password" id="regPassword" placeholder="اختر كلمة مرور قوية" required>
                </div>

                <div class="form-group">
                    <label for="regPasswordConfirm">
                        <i class="fas fa-key"></i> تأكيد كلمة المرور
                    </label>
                    <input type="password" id="regPasswordConfirm" placeholder="أعد كتابة كلمة المرور" required>
                </div>

                <button type="button" class="btn-primary" onclick="handleRegister()">
                    <i class="fas fa-user-check"></i> إنشاء الحساب
                </button>

                <button type="button" class="btn-secondary" onclick="toggleRegister()">
                    <i class="fas fa-arrow-left"></i> العودة للدخول
                </button>
            </div>

            <div id="loadingSpinner" class="loading-spinner" style="display: none;">
                <div class="spinner"></div>
                <p>جاري المعالجة...</p>
            </div>

            <div id="notification" class="notification" style="display: none;"></div>
        </div>

        <div class="features-info">
            <h2>المميزات الرئيسية</h2>
            <div class="features-grid">
                <div class="feature-card">
                    <i class="fas fa-shield-alt"></i>
                    <h3>تشفير قوي</h3>
                    <p>تشفير Fernet-AES من الدرجة العسكرية</p>
                </div>
                <div class="feature-card">
                    <i class="fas fa-zap"></i>
                    <h3>سرعة عالية</h3>
                    <p>معالجة الملفات الكبيرة بسرعة فائقة</p>
                </div>
                <div class="feature-card">
                    <i class="fas fa-history"></i>
                    <h3>سجل كامل</h3>
                    <p>تتبع جميع العمليات بدقة</p>
                </div>
                <div class="feature-card">
                    <i class="fas fa-lock"></i>
                    <h3>أمان عالي</h3>
                    <p>كلمات مرور محمية بـ PBKDF2</p>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
